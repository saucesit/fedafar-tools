<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEDAFAR - App de Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- ── Pantalla de Login ─────────────────────────────────────── -->
    <div id="login-screen">
        <div class="login-card">
            <img src="/static/logo%20fedafar%20antiguo.jpeg" alt="FEDAFAR" class="login-logo">
            <h1 class="login-title">FEDAFAR</h1>
            <p class="login-subtitle">Droguería Integral</p>
            <div id="login-error" class="login-error hidden"></div>
            <div class="login-form">
                <div class="login-input-group">
                    <i data-lucide="user"></i>
                    <input type="text" id="login-username" placeholder="Usuario" autocomplete="username">
                </div>
                <div class="login-input-group">
                    <i data-lucide="lock"></i>
                    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password">
                </div>
                <button id="login-btn" class="login-submit-btn">
                    Ingresar
                </button>
            </div>
        </div>
    </div>

    <!-- ── App principal (oculta hasta login) ───────────────────── -->
    <div id="app" class="hidden">

        <!-- Header -->
        <header class="main-header">
            <div class="logo-container">
                <img src="/static/logo%20fedafar%20antiguo.jpeg" alt="FEDAFAR Logo" class="app-logo">
                <div class="brand-text">
                    <h1>FEDAFAR</h1>
                    <span>Droguería Integral</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="cuenta-btn" class="icon-btn" title="Mi Cuenta">
                    <i data-lucide="file-text"></i>
                </button>
                <button id="cart-btn" class="icon-btn">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count">0</span>
                </button>
                <button id="logout-btn" class="icon-btn" title="Cerrar sesión">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-container">
                <i data-lucide="search"></i>
                <input type="text" id="product-search" placeholder="Buscar por producto o laboratorio...">
            </div>
        </div>

        <!-- Main Content -->
        <main id="main-content">
            <section id="categories-section">
                <div class="category-pills">
                    <button class="pill active" data-cat="all">Todos</button>
                    <button class="pill" data-cat="Analgésicos">Analgésicos</button>
                    <button class="pill" data-cat="Antibióticos">Antibióticos</button>
                    <button class="pill" data-cat="Cardiovascular">Cardio</button>
                    <button class="pill" data-cat="Corticoides">Corticoides</button>
                    <button class="pill" data-cat="Descartables">Descartables 🩺</button>
                </div>
            </section>
            <section id="products-section">
                <div id="product-grid" class="product-grid"></div>
            </section>
        </main>

        <!-- Cart Modal -->
        <div id="cart-modal" class="cart-modal hidden">
            <div class="cart-content">
                <div class="cart-header">
                    <h2>Tu Pedido</h2>
                    <button id="close-cart" class="icon-btn"><i data-lucide="x"></i></button>
                </div>
                <div id="cart-items" class="cart-items-list"></div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <span>Total estimado:</span>
                        <span id="total-price">$ 0,00</span>
                    </div>
                    <div class="cart-actions">
                        <button id="back-to-shop" class="secondary-btn">Volver</button>
                        <button id="send-order" class="primary-btn">
                            <i data-lucide="send"></i> Enviar Pedido
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mi Cuenta Modal -->
        <div id="cuenta-modal" class="cart-modal hidden">
            <div class="cart-content">
                <div class="cart-header">
                    <h2>Mi Cuenta Corriente</h2>
                    <button id="close-cuenta" class="icon-btn"><i data-lucide="x"></i></button>
                </div>
                <div id="cuenta-body" class="cuenta-body">
                    <p style="text-align:center; color: var(--text-muted);">Cargando...</p>
                </div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <span>Saldo total pendiente:</span>
                        <span id="cuenta-saldo-total">$ 0,00</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
