<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEDAFAR - App de Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lucide icons from CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="logo-container">
                <img src="../logo fedafar antiguo.jpeg" alt="FEDAFAR Logo" class="app-logo">
                <div class="brand-text">
                    <h1>FEDAFAR</h1>
                    <span>Droguería Integral</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="cart-btn" class="icon-btn">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-container">
                <i data-lucide="search"></i>
                <input type="text" id="product-search" placeholder="Buscar por producto o laboratorio...">
            </div>
        </div>

        <!-- Main Content -->
        <main id="main-content">
            <!-- News Section -->
            <section id="news-section">
                <h2 class="section-title">Novedades</h2>
                <div class="news-slider">
                    <div class="news-card promo">
                        <div class="news-info">
                            <h3>Ofertas de Abril</h3>
                            <p>Descuentos especiales en la línea Teva y Savant.</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Categories -->
            <section id="categories-section">
                <div class="category-pills">
                    <button class="pill active" data-cat="all">Todos</button>
                    <button class="pill" data-cat="Analgésicos">Analgésicos</button>
                    <button class="pill" data-cat="Antibióticos">Antibióticos</button>
                    <button class="pill" data-cat="Cardiovascular">Cardio</button>
                    <button class="pill" data-cat="Corticoides">Corticoides</button>
                </div>
            </section>

            <!-- Product Grid -->
            <section id="products-section">
                <div id="product-grid" class="product-grid">
                    <!-- Products will be injected here -->
                </div>
            </section>
        </main>

        <!-- Cart Sidebar/Modal -->
        <div id="cart-modal" class="cart-modal hidden">
            <div class="cart-content">
                <div class="cart-header">
                    <h2>Tu Pedido</h2>
                    <button id="close-cart" class="icon-btn"><i data-lucide="x"></i></button>
                </div>
                <div id="cart-items" class="cart-items-list">
                    <!-- Cart items here -->
                </div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <span>Total estimado:</span>
                        <span id="total-price">$ 0,00</span>
                    </div>
                    <div class="cart-actions">
                        <button id="back-to-shop" class="secondary-btn">Volver</button>
                        <button id="send-order" class="primary-btn">
                            <i data-lucide="send"></i> Enviar Pedido
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de la App (Ahora lee desde la API) -->
    <script src="app.js"></script>
</body>
</html>
